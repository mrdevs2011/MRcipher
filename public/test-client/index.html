<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Chat — Firebase</title>
  <style>
    :root {
      --bg: #0b0f19;
      --card: #151c2c;
      --input: #1f2937;
      --border: #243049;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #38bdf8;
      --sent: #22c55e;
      --received: #3b82f6;
      --radius: 0.75rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      padding: 1rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
    p { color: var(--muted); margin: 0 0 1rem; }
    .phones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 800px) {
      .phones { grid-template-columns: 1fr; }
    }
    .phone {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      height: 600px;
    }
    .phone-header {
      font-weight: 700;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
      background: #020617;
      border-radius: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .msg {
      max-width: 80%;
      padding: 0.625rem 0.875rem;
      border-radius: 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      word-break: break-word;
    }
    .msg.sent {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      margin-left: auto;
      border-bottom-right-radius: 0.25rem;
    }
    .msg.received {
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd;
      margin-right: auto;
      border-bottom-left-radius: 0.25rem;
    }
    .msg-meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }
    .input-row {
      display: flex;
      gap: 0.5rem;
    }
    input {
      flex: 1;
      padding: 0.625rem 0.875rem;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: var(--text);
      font-size: 0.95rem;
    }
    button {
      padding: 0.625rem 1.25rem;
      border: none;
      border-radius: 0.5rem;
      background: var(--primary);
      color: #020617;
      font-weight: 700;
      cursor: pointer;
    }
    .status {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Test Chat</h1>
    <p>Ikki telefon simulatori. Xabarlar Firebase Firestore orqali real-time almashadi.</p>

    <div class="phones">
      <div class="phone">
        <div class="phone-header">Telefon 1</div>
        <div id="messages1" class="messages"></div>
        <div class="input-row">
          <input id="input1" type="text" placeholder="Xabar yozing..." />
          <button onclick="send(1)">Yuborish</button>
        </div>
        <div id="status1" class="status"></div>
      </div>

      <div class="phone">
        <div class="phone-header">Telefon 2</div>
        <div id="messages2" class="messages"></div>
        <div class="input-row">
          <input id="input2" type="text" placeholder="Xabar yozing..." />
          <button onclick="send(2)">Yuborish</button>
        </div>
        <div id="status2" class="status"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyA8SGEx8i6pSzQ1RBTnnWxehrctdpih59c',
      authDomain: 'test-36e06.firebaseapp.com',
      projectId: 'test-36e06',
      storageBucket: 'test-36e06.firebasestorage.app',
      messagingSenderId: '311567938421',
      appId: '1:311567938421:web:27f4d69652515b6ab3d93c',
      measurementId: 'G-MK8N9K9N2C',
    };

    // MRcipher API settings for this test
    const CIPHER_SERVER_URL = 'https://mrcipher.vercel.app';
    const CIPHER_API_KEY = 'mr_pqjHR-0LIqNZts8S960z98494vDvQseWmvPF2vRdMaM';

    initializeApp(firebaseConfig);
    const db = getFirestore();
    const messagesRef = collection(db, 'messages');

    function status(n, text) {
      document.getElementById('status' + n).textContent = text;
    }

    async function encrypt(text) {
      const res = await fetch(`${CIPHER_SERVER_URL}/api/v1/encrypt`, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          Authorization: `Bearer ${CIPHER_API_KEY}`,
        },
        body: JSON.stringify({ content: text }),
      });
      const json = await res.json();
      if (!res.ok || !json.success) {
        throw new Error(json.error?.message || `HTTP ${res.status}`);
      }
      return json.data;
    }

    async function decrypt(payload) {
      const res = await fetch(`${CIPHER_SERVER_URL}/api/v1/decrypt`, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          Authorization: `Bearer ${CIPHER_API_KEY}`,
        },
        body: JSON.stringify({ content: payload }),
      });
      const json = await res.json();
      if (!res.ok || !json.success) {
        throw new Error(json.error?.message || `HTTP ${res.status}`);
      }
      return json.data;
    }

    function isEncryptedPayload(value) {
      return (
        typeof value === 'object' &&
        value !== null &&
        'ciphertext' in value &&
        'iv' in value &&
        'tag' in value &&
        'version' in value
      );
    }

    function render(id, from, text, time) {
      const el = document.getElementById('messages' + id);
      const div = document.createElement('div');
      div.className = 'msg ' + (from === id ? 'sent' : 'received');
      div.innerHTML = `<div>${escapeHtml(text)}</div><div class="msg-meta">${from === id ? 'Siz' : 'Telefon ' + from} • ${time}</div>`;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    window.send = async function(n) {
      const input = document.getElementById('input' + n);
      const text = input.value.trim();
      if (!text) return;

      status(n, 'Shifrlanmoqda...');

      try {
        const encrypted = await encrypt(text);

        await addDoc(messagesRef, {
          text: encrypted,
          from: n,
          createdAt: serverTimestamp(),
        });
        input.value = '';
        status(n, 'Yuborildi (shifrlangan)');
      } catch (err) {
        status(n, 'Xatolik: ' + err.message);
      }
    };

    onSnapshot(query(messagesRef, orderBy('createdAt', 'asc')), (snapshot) => {
      document.getElementById('messages1').innerHTML = '';
      document.getElementById('messages2').innerHTML = '';

      snapshot.forEach(async (doc) => {
        const data = doc.data();
        const from = data.from;
        const raw = data.text;
        const time = data.createdAt?.toDate ? data.createdAt.toDate().toLocaleTimeString('uz-UZ') : '-';

        let plain = raw;
        if (isEncryptedPayload(raw)) {
          try {
            plain = await decrypt(raw);
          } catch (err) {
            plain = '[shifrni ochib bo\'lmadi]';
          }
        }

        render(1, from, plain, time);
        render(2, from, plain, time);
      });
    }, (err) => {
      status(1, 'Firestore xatolik: ' + err.message);
      status(2, 'Firestore xatolik: ' + err.message);
    });
  </script>
</body>
</html>
