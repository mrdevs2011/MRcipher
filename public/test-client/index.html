<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRcipher Test</title>
  <style>
    body {
      margin: 0;
      background: #0b0f19;
      color: #f8fafc;
      font-family: system-ui, sans-serif;
      padding: 2rem 1rem;
    }
    .container { max-width: 680px; margin: 0 auto; }
    h1 { margin: 0 0 0.25rem; }
    p { color: #94a3b8; margin: 0 0 1.5rem; }
    .card {
      background: #151c2c;
      border: 1px solid #243049;
      border-radius: 0.75rem;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 0.375rem;
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      padding: 0.625rem 0.875rem;
      background: #1f2937;
      border: 1px solid #243049;
      border-radius: 0.5rem;
      color: #f8fafc;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      box-sizing: border-box;
    }
    textarea { min-height: 100px; font-family: monospace; }
    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 0.5rem;
      background: #38bdf8;
      color: #020617;
      font-weight: 700;
      cursor: pointer;
      margin-right: 0.5rem;
    }
    pre {
      background: #020617;
      border: 1px solid #243049;
      border-radius: 0.5rem;
      padding: 1rem;
      color: #e2e8f0;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 60px;
    }
    .status { margin-top: 0.5rem; font-size: 0.875rem; }
    .ok { color: #22c55e; }
    .err { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MRcipher Test</h1>
    <p>Server URL va API key kiriting, so'ngra shifrlashni sinang.</p>

    <div class="card">
      <label>Server URL</label>
      <input id="serverUrl" type="text" value="https://mrcipher.vercel.app" />

      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="mr_..." />
    </div>

    <div class="card">
      <label>JSON ma'lumot</label>
      <textarea id="plaintext">{"phone":"+998901234567","otp":"123456"}</textarea>
      <button onclick="encrypt()">Encrypt</button>
      <button onclick="decrypt()">Decrypt</button>
      <div id="status" class="status"></div>
      <pre id="output">Natija shu yerda chiqadi...</pre>
    </div>
  </div>

  <script>
    let lastEncrypted = null;

    function cfg() {
      return {
        serverUrl: document.getElementById('serverUrl').value.replace(/\/$/, ''),
        apiKey: document.getElementById('apiKey').value.trim(),
      };
    }

    function status(text, ok) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status ' + (ok ? 'ok' : 'err');
    }

    async function api(path, body) {
      const { serverUrl, apiKey } = cfg();
      if (!apiKey) throw new Error('API key kiriting');

      const res = await fetch(serverUrl + path, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          Authorization: 'Bearer ' + apiKey,
        },
        body: JSON.stringify(body),
      });

      const json = await res.json();
      if (!res.ok || !json.success) {
        throw new Error(json.error?.message || `HTTP ${res.status}`);
      }
      return json;
    }

    async function encrypt() {
      const el = document.getElementById('plaintext');
      let content;
      try {
        content = JSON.parse(el.value);
      } catch (e) {
        status('JSON noto\'g\'ri: ' + e.message, false);
        return;
      }

      try {
        const res = await api('/api/v1/encrypt', { content });
        lastEncrypted = res.data;
        document.getElementById('output').textContent = JSON.stringify(res, null, 2);
        status('Shifrlash muvaffaqiyatli', true);
      } catch (e) {
        document.getElementById('output').textContent = '';
        status('Xatolik: ' + e.message, false);
      }
    }

    async function decrypt() {
      if (!lastEncrypted) {
        status('Avval encrypt qiling', false);
        return;
      }

      try {
        const res = await api('/api/v1/decrypt', { content: lastEncrypted });
        document.getElementById('output').textContent = JSON.stringify(res.data, null, 2);
        status('Shifr ochildi', true);
      } catch (e) {
        document.getElementById('output').textContent = '';
        status('Xatolik: ' + e.message, false);
      }
    }
  </script>
</body>
</html>
